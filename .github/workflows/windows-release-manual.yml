name: Release Build (Manual)

on:
  workflow_dispatch:
    inputs:
      source_ref:
        description: Branch, tag, or commit SHA to build
        required: true
        default: release/v3.0.3-windows
        type: string
      release_tag:
        description: Git tag for the GitHub release
        required: true
        default: v3.0.3
        type: string
      release_name:
        description: Title of the GitHub release
        required: true
        default: InputLeap 3.0.3 (Windows + macOS Apple Silicon)
        type: string
      prerelease:
        description: Mark release as prerelease
        required: false
        default: false
        type: boolean
      draft:
        description: Create release as draft
        required: false
        default: false
        type: boolean

permissions:
  contents: write

env:
  B_BUILD_TYPE: Release
  QT_VERSION: "6.6"
  QT_MAJOR: "6"
  MACOS_MIN_VERSION: "14"
  MACOS_ARCH: "arm64"
  OPENSSL_INSTALL_PATH: "/Users/runner/openssl"
  OPENSSL_VERSION: "3.2.0"

jobs:
  windows-release:
    name: Windows Release Build
    runs-on: windows-2022
    outputs:
      source_sha: ${{ steps.source.outputs.sha }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.source_ref }}
          path: input-leap
          submodules: recursive

      - name: Capture source commit
        id: source
        shell: bash
        run: |
          cd input-leap
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Download Bonjour SDK-like
        id: bonjour
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          New-Item -Force -ItemType Directory -Path .\deps | Out-Null

          Invoke-WebRequest 'https://github.com/nelsonjchen/mDNSResponder/releases/download/v2019.05.08.1/x64_RelWithDebInfo.zip' -OutFile 'deps\BonjourSDKLike.zip'
          Expand-Archive .\deps\BonjourSDKLike.zip -DestinationPath .\deps\BonjourSDKLike
          Remove-Item deps\BonjourSDKLike.zip

          "path=$env:GITHUB_WORKSPACE\deps\BonjourSDKLike" >> $env:GITHUB_OUTPUT

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          cache: true
          cache-key-prefix: windows-${{ runner.os }}-Qt${{ env.QT_VERSION }}

      - name: Configure build system
        shell: pwsh
        env:
          BONJOUR_SDK_HOME: ${{ steps.bonjour.outputs.path }}
        run: |
          New-Item -Force -ItemType Directory -Path .\build | Out-Null

          cd build
          cmake -S ..\input-leap -G "Visual Studio 17 2022" -A x64 -D CMAKE_BUILD_TYPE=$env:B_BUILD_TYPE `
            -DQT_DEFAULT_MAJOR_VERSION=${{ env.QT_MAJOR }} `
            -DINPUTLEAP_VERSION_DESC=release `
            -DINPUTLEAP_BUILD_GULRAK_FILESYSTEM=0 `
            -DDNSSD_LIB="$env:BONJOUR_SDK_HOME\Lib\x64\dnssd.lib" `
            -D CMAKE_INSTALL_PREFIX=input-leap-install

      - name: Run build system
        shell: pwsh
        run: cmake --build build --config $env:B_BUILD_TYPE --target install

      - name: Normalize installer product version (legacy tags)
        shell: pwsh
        run: |
          $iss = ".\build\installer-inno\input-leap.iss"
          if (-not (Test-Path $iss)) {
            throw "Expected installer script not found: $iss"
          }

          $rawTag = "${{ inputs.release_tag }}"
          $normalized = $rawTag.TrimStart("v")
          $normalized = ($normalized -split '[-+]')[0]
          if ($normalized -notmatch '^\d+\.\d+\.\d+(\.\d+)?$') {
            throw "release_tag must contain a numeric version like v3.0.3 (got '$rawTag')"
          }
          if ($normalized -match '^\d+\.\d+\.\d+$') {
            $normalized = "$normalized.0"
          }

          (Get-Content $iss) `
            -replace '^\s*#define MyAppVersion ".*"$', "#define MyAppVersion ""$normalized""" `
            | Set-Content $iss

      - name: Build installer
        shell: pwsh
        run: '& "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" /Qp .\build\installer-inno\input-leap.iss'

      - name: Locate installer artifacts
        id: installer
        shell: pwsh
        run: |
          $candidates = @(
            "build/installer-inno/bin",
            "installer-inno/bin"
          )

          $found = $null
          foreach ($dir in $candidates) {
            if ((Test-Path $dir -PathType Container) -and ((Get-ChildItem -Path $dir -File | Measure-Object).Count -gt 0)) {
              $found = $dir
              break
            }
          }

          if (-not $found) {
            Write-Host "Installer output directories not found. Checked:"
            $candidates | ForEach-Object { Write-Host " - $_" }
            throw "No installer files were produced"
          }

          "dir=$found" >> $env:GITHUB_OUTPUT

      - name: Collect assets
        id: assets
        shell: pwsh
        run: |
          $portable = "InputLeap-${{ inputs.release_tag }}-windows-portable.zip"
          Compress-Archive -Path build\input-leap-install\* -DestinationPath $portable
          "portable=$portable" >> $env:GITHUB_OUTPUT

      - uses: actions/upload-artifact@v4
        with:
          name: windows-release-${{ inputs.release_tag }}
          path: |
            ${{ steps.assets.outputs.portable }}
            ${{ steps.installer.outputs.dir }}/*
          if-no-files-found: error

  macos-apple-silicon-release:
    name: macOS Apple Silicon Release Build
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.source_ref }}
          path: input-leap
          submodules: recursive

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          cache: true
          cache-key-prefix: macOS-${{ runner.os }}-Qt${{ env.QT_VERSION }}

      - name: Setup the image
        run: brew install ninja

      - name: Cache OpenSSL Universal
        id: cache-openssl
        uses: actions/cache@v4.2.4
        with:
          path: ${{ env.OPENSSL_INSTALL_PATH }}
          key: macOS-${{ runner.os }}-ssl-${{ env.MACOS_ARCH }}-${{ env.OPENSSL_VERSION }}

      - name: Build OpenSSL Universal
        if: steps.cache-openssl.outputs.cache-hit != 'true'
        run: |
          curl -L "https://github.com/openssl/openssl/releases/download/openssl-${{ env.OPENSSL_VERSION }}/openssl-${{ env.OPENSSL_VERSION }}.tar.gz" -o "openssl-${{ env.OPENSSL_VERSION }}.tar.gz"
          tar -xf "openssl-${{ env.OPENSSL_VERSION }}.tar.gz"
          echo "#!/bin/bash
          if [[ \$* == *-arch\ x86_64* ]] && ! [[ \$* == *-arch\ arm64* ]]; then
            cc -arch arm64 \$@
          else
            cc \$@
          fi" >> /Users/runner/cc_override
          chmod a+x /Users/runner/cc_override
          cat /Users/runner/cc_override
          export MACOSX_DEPLOYMENT_TARGET=${{ env.MACOS_MIN_VERSION }}
          export CC=/Users/runner/cc_override
          cd "openssl-${{ env.OPENSSL_VERSION }}"
          ./configure no-asm darwin64-x86_64-cc --prefix=${{ env.OPENSSL_INSTALL_PATH }}
          make
          make install

      - name: Setup the build
        run: |
          cmake -DCMAKE_BUILD_TYPE="${B_BUILD_TYPE}" -S input-leap -B build -G Ninja \
                -DCMAKE_UNITY_BUILD=1 \
                -DOpenSSL_ROOT=${{ env.OPENSSL_INSTALL_PATH }} \
                -DCMAKE_OSX_SYSROOT=$(xcode-select --print-path)/Platforms/MacOSX.platform/Developer/SDKs/MacOSX.sdk \
                -DCMAKE_OSX_DEPLOYMENT_TARGET=${{ env.MACOS_MIN_VERSION }} \
                -DQT_DEFAULT_MAJOR_VERSION=${{ env.QT_MAJOR }} \
                -DINPUTLEAP_VERSION_DESC=release \
                -DINPUTLEAP_BUILD_GULRAK_FILESYSTEM=0 \
                -DCMAKE_OSX_ARCHITECTURES="${{ env.MACOS_ARCH }}"

      - name: Run the build
        run: cmake --build build --parallel

      - uses: actions/upload-artifact@v4
        with:
          name: macos-release-${{ inputs.release_tag }}
          path: ./build/bundle/*.dmg
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - windows-release
      - macos-apple-silicon-release

    steps:
      - name: Download Windows assets
        uses: actions/download-artifact@v4
        with:
          name: windows-release-${{ inputs.release_tag }}
          path: release-assets/windows

      - name: Download macOS assets
        uses: actions/download-artifact@v4
        with:
          name: macos-release-${{ inputs.release_tag }}
          path: release-assets/macos

      - name: Show release assets
        run: find release-assets -maxdepth 4 -type f -print

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag }}
          target_commitish: ${{ needs.windows-release.outputs.source_sha }}
          name: ${{ inputs.release_name }}
          draft: ${{ inputs.draft }}
          prerelease: ${{ inputs.prerelease }}
          overwrite_files: true
          files: |
            release-assets/windows/**/*.zip
            release-assets/windows/**/*.exe
            release-assets/macos/**/*.dmg
          fail_on_unmatched_files: true
